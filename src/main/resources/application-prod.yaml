spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
  sql:
    init:
      mode: always
  web:
    error:
      include-stacktrace: never

server:
  port: ${PORT:8080}

api:
  security:
    token:
      secret: ${JWT_SECRET:my-secret-key}