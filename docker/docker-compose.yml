version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cellrepair-db
    environment:
      MYSQL_DATABASE: cellrepair
      MYSQL_USER: admin
      MYSQL_PASSWORD: 123
      MYSQL_ROOT_PASSWORD: 123
    ports:
      - "3307:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: